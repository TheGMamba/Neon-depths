<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>NEON DEPTHS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05060f; --bg2:#0a0c20;
    --cyan:#22f0ff; --pink:#ff2d6f; --orange:#ff9b3d;
    --purple:#bd5bff; --green:#5dffa0; --gold:#ffe055; --white:#fffbe6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{font-family:'VT323',monospace;display:flex;align-items:center;justify-content:center;
    color:var(--white);background:radial-gradient(circle at 50% 35%, var(--bg2), var(--bg) 75%);touch-action:none;}
  #wrap{position:relative;width:100%;height:100%;max-width:960px;max-height:100vh;overflow:hidden;}
  canvas{display:block;width:100%;height:100%;}
  .crt::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:30;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.16) 2px 4px);mix-blend-mode:multiply;}
  .crt::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:31;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 52%, rgba(0,0,0,.6) 100%);}

  #hud{position:absolute;top:0;left:0;right:0;z-index:20;padding:12px 16px;pointer-events:none;
       font-size:23px;letter-spacing:.5px;text-shadow:0 0 8px currentColor;}
  .bar{height:15px;border:2px solid rgba(255,255,255,.32);background:rgba(0,0,0,.45);position:relative;border-radius:3px;overflow:hidden;max-width:280px;}
  .bar > i{position:absolute;inset:0;transform-origin:left;transition:transform .12s linear;}
  #hpfill{background:linear-gradient(90deg,#ff2d6f,#ff9b3d);box-shadow:0 0 12px var(--pink);}
  .hudrow{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .hudrow .lbl{min-width:36px;color:var(--cyan);}
  #stats{display:flex;justify-content:flex-start;gap:22px;font-size:27px;margin-top:2px;color:var(--cyan);padding-right:100px;}
  #stats b{color:var(--gold);}
  #relics{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;max-width:300px;}
  #relics span{font-size:21px;color:var(--gold);text-shadow:0 0 8px var(--gold);
    width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    border:1.5px solid rgba(255,224,85,.35);border-radius:6px;background:rgba(255,224,85,.06);}

  .panel{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;
         text-align:center;padding:24px;background:radial-gradient(circle at 50% 45%,rgba(10,12,32,.8),rgba(5,6,15,.95));backdrop-filter:blur(2px);}
  .hidden{display:none!important;}
  h1{font-family:'Silkscreen',monospace;font-size:clamp(28px,8vw,60px);line-height:1.1;
     color:var(--cyan);text-shadow:0 0 22px var(--cyan),0 0 44px rgba(34,240,255,.5),4px 4px 0 var(--pink);
     margin-bottom:6px;letter-spacing:2px;}
  .sub{font-size:25px;color:var(--purple);margin-bottom:24px;text-shadow:0 0 10px var(--purple);}
  .keys{font-size:22px;color:rgba(255,255,255,.72);line-height:1.55;margin-bottom:26px;max-width:460px;}
  .keys b{color:var(--gold);}
  .legend{font-size:21px;color:rgba(255,255,255,.7);margin-bottom:26px;line-height:1.6;}
  .legend span{color:var(--gold);}
  button{font-family:'Silkscreen',monospace;cursor:pointer;border:3px solid var(--cyan);
    background:rgba(34,240,255,.08);color:var(--cyan);padding:16px 30px;font-size:18px;letter-spacing:2px;
    text-shadow:0 0 8px var(--cyan);box-shadow:0 0 20px rgba(34,240,255,.35),inset 0 0 14px rgba(34,240,255,.15);transition:.12s;border-radius:4px;}
  button:hover,button:active{background:var(--cyan);color:#04111a;box-shadow:0 0 34px var(--cyan);}

  #cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:660px;}
  .card{width:172px;min-height:150px;border:3px solid var(--purple);background:rgba(189,91,255,.07);border-radius:10px;
    padding:16px;cursor:pointer;transition:.12s;display:flex;flex-direction:column;align-items:center;gap:8px;
    box-shadow:0 0 20px rgba(189,91,255,.25),inset 0 0 16px rgba(189,91,255,.1);}
  .card:hover,.card:active{transform:translateY(-7px) scale(1.04);border-color:var(--gold);box-shadow:0 0 32px var(--gold);}
  .card .ico{font-size:42px;line-height:1;filter:drop-shadow(0 0 12px currentColor);}
  .card .nm{font-family:'Silkscreen',monospace;font-size:14px;color:var(--gold);text-shadow:0 0 8px var(--gold);}
  .card .ds{font-size:21px;color:rgba(255,255,255,.8);line-height:1.15;}
  .levelbanner{font-family:'Silkscreen',monospace;font-size:24px;color:var(--green);text-shadow:0 0 16px var(--green);margin-bottom:20px;}

  .dead h1{color:var(--pink);text-shadow:0 0 22px var(--pink),0 0 44px rgba(255,45,111,.5),4px 4px 0 var(--purple);}
  #resultcard{font-size:28px;line-height:1.5;color:var(--white);margin-bottom:14px;
    border:2px dashed rgba(255,255,255,.3);padding:16px 30px;border-radius:8px;background:rgba(0,0,0,.32);}
  #resultcard .big{font-family:'Silkscreen',monospace;font-size:32px;color:var(--gold);text-shadow:0 0 14px var(--gold);}
  .btnrow{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
  #copybtn{border-color:var(--gold);color:var(--gold);text-shadow:0 0 8px var(--gold);box-shadow:0 0 20px rgba(255,224,85,.3),inset 0 0 14px rgba(255,224,85,.12);}
  #copybtn:hover{background:var(--gold);color:#1a1300;box-shadow:0 0 34px var(--gold);}

  #stick{position:absolute;z-index:25;width:130px;height:130px;border-radius:50%;border:2px solid rgba(34,240,255,.4);
    background:rgba(34,240,255,.05);display:none;pointer-events:none;box-shadow:0 0 24px rgba(34,240,255,.2),inset 0 0 24px rgba(34,240,255,.08);}
  #stick i{position:absolute;left:50%;top:50%;width:54px;height:54px;margin:-27px;border-radius:50%;background:rgba(34,240,255,.35);box-shadow:0 0 20px var(--cyan);}

  /* attract screen */
  .menu{background:linear-gradient(180deg,rgba(5,6,15,.45),rgba(5,6,15,.78));backdrop-filter:none;}
  .menu .logo{margin-bottom:10px;}
  .menu .welcome{font-family:'Silkscreen',monospace;font-size:clamp(13px,3vw,20px);letter-spacing:6px;
    color:var(--purple);text-shadow:0 0 12px var(--purple);margin-bottom:10px;
    animation:fadeUp .6s ease both;}
  .menu h1{font-size:clamp(40px,13vw,92px);line-height:.95;margin:0;letter-spacing:3px;
    animation:logoIn .8s cubic-bezier(.2,.8,.2,1) both, glowPulse 3.4s ease-in-out 1s infinite;}
  @keyframes logoIn{from{opacity:0;transform:translateY(24px) scale(.92)}to{opacity:1;transform:none}}
  @keyframes glowPulse{0%,100%{text-shadow:0 0 22px var(--cyan),0 0 48px rgba(34,240,255,.5),4px 4px 0 var(--pink)}
    50%{text-shadow:0 0 34px var(--cyan),0 0 72px rgba(34,240,255,.75),5px 5px 0 var(--pink)}}
  .menu .sub,.menu .best,.menu .keys,.menu .legend,.menu .tip{animation:fadeUp .55s ease both;}
  .menu .sub{animation-delay:.18s} .menu .best{animation-delay:.28s} .menu .keys{animation-delay:.4s}
  .menu .legend{animation-delay:.52s} .menu .tip{animation-delay:.78s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .best{font-size:25px;color:var(--gold);text-shadow:0 0 12px var(--gold);margin-bottom:18px;letter-spacing:1px;}
  .best b{font-family:'Silkscreen',monospace;font-size:22px;}
  .legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:26px;}
  .chip{border:1.5px solid rgba(34,240,255,.32);border-radius:20px;padding:5px 13px;font-size:19px;
    color:rgba(255,255,255,.82);background:rgba(34,240,255,.05);}
  .chip.start{border-color:rgba(255,224,85,.5);color:var(--gold);}
  .chip.elite{border-color:rgba(255,155,61,.5);color:var(--orange);}
  .chip.treasure{border-color:rgba(93,255,160,.5);color:var(--green);}
  .chip.boss{border-color:rgba(255,45,111,.5);color:var(--pink);}
  .pulse{animation:btnPulse 1.9s ease-in-out infinite;}
  @keyframes btnPulse{0%,100%{box-shadow:0 0 20px rgba(34,240,255,.35),inset 0 0 14px rgba(34,240,255,.15)}
    50%{box-shadow:0 0 44px rgba(34,240,255,.85),inset 0 0 22px rgba(34,240,255,.3)}}
  .tip{margin-top:20px;font-size:19px;color:rgba(255,255,255,.5);max-width:430px;min-height:24px;font-style:italic;}
  #controls{position:absolute;top:12px;right:12px;z-index:50;display:flex;gap:8px;}
  .modes{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;animation:fadeUp .55s ease both;animation-delay:.6s;}
  #endlessbtn{border-color:rgba(189,91,255,.6);color:var(--purple);text-shadow:0 0 8px var(--purple);
    box-shadow:0 0 16px rgba(189,91,255,.3),inset 0 0 12px rgba(189,91,255,.12);}
  #endlessbtn:hover{background:var(--purple);color:#120020;box-shadow:0 0 30px var(--purple);}
  .dailylabel{margin-top:16px;font-size:19px;color:rgba(189,91,255,.85);letter-spacing:.5px;animation:fadeUp .6s ease both;animation-delay:.72s;}
  .ghostbtn{margin-top:18px;border-color:rgba(255,224,85,.5);color:var(--gold);text-shadow:0 0 8px var(--gold);
    box-shadow:0 0 16px rgba(255,224,85,.25),inset 0 0 12px rgba(255,224,85,.1);font-size:15px;padding:12px 22px;animation:fadeUp .55s ease both;animation-delay:.66s;}
  .ghostbtn:hover{background:var(--gold);color:#1a1300;box-shadow:0 0 30px var(--gold);}
  .cores{font-size:22px;color:var(--gold);text-shadow:0 0 10px var(--gold);margin-top:12px;animation:fadeUp .55s ease both;animation-delay:.7s;}
  .coreshdr{font-size:27px;color:var(--gold);text-shadow:0 0 12px var(--gold);margin-bottom:18px;}
  .coreshdr b{font-family:'Silkscreen',monospace;}
  #metagrid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:760px;max-height:58vh;overflow-y:auto;margin-bottom:22px;padding:4px;}
  .node{width:172px;border:2px solid rgba(34,240,255,.3);border-radius:10px;padding:12px;background:rgba(34,240,255,.05);
    display:flex;flex-direction:column;gap:6px;align-items:center;box-shadow:0 0 14px rgba(34,240,255,.12);}
  .node .ico{font-size:30px;color:var(--cyan);text-shadow:0 0 10px var(--cyan);line-height:1;}
  .node .nm{font-family:'Silkscreen',monospace;font-size:11px;color:var(--white);letter-spacing:.5px;}
  .node .ds{font-size:18px;color:rgba(255,255,255,.72);min-height:42px;line-height:1.15;}
  .node .pips{display:flex;gap:4px;}
  .node .pip{width:11px;height:11px;border-radius:50%;border:1px solid rgba(34,240,255,.5);}
  .node .pip.on{background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
  .node button{padding:7px 14px;font-size:14px;border-width:2px;width:100%;}
  .node button:disabled{opacity:.4;cursor:default;border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.4);box-shadow:none;background:transparent;}
  .subrow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:18px;animation:fadeUp .55s ease both;animation-delay:.66s;}
  .subrow .ghostbtn{margin-top:0;animation:none;}
  .boardsub{font-size:20px;color:rgba(255,255,255,.6);margin-bottom:18px;}
  #boardlist{display:flex;flex-direction:column;gap:7px;width:100%;max-width:470px;max-height:58vh;overflow-y:auto;margin-bottom:22px;padding:2px;}
  .brow{display:flex;align-items:center;gap:12px;padding:9px 14px;border:1.5px solid rgba(34,240,255,.25);border-radius:8px;background:rgba(34,240,255,.04);}
  .brow .rank{font-family:'Silkscreen',monospace;font-size:14px;color:var(--cyan);min-width:36px;text-align:left;}
  .brow .bscore{font-size:27px;color:var(--gold);text-shadow:0 0 8px var(--gold);flex:1;text-align:left;}
  .brow .bmeta{font-size:18px;color:rgba(255,255,255,.6);}
  .brow.you{border-color:var(--gold);box-shadow:0 0 18px rgba(255,224,85,.35);background:rgba(255,224,85,.07);}
  .empty{font-size:22px;color:rgba(255,255,255,.5);padding:24px;}
  #controls button{font-family:'VT323',monospace;width:46px;height:46px;padding:0;font-size:23px;
    border:1px solid rgba(255,255,255,.28);color:#eafffd;border-radius:13px;letter-spacing:0;
    background:linear-gradient(160deg,rgba(70,82,120,.55),rgba(18,22,42,.6));
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    box-shadow:0 6px 16px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.4),inset 0 -3px 6px rgba(0,0,0,.3);}
  #controls button:hover,#controls button:active{background:linear-gradient(160deg,rgba(92,106,150,.72),rgba(28,34,58,.72));
    box-shadow:0 8px 22px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.5),inset 0 -3px 6px rgba(0,0,0,.3);}
  #pause{background:none;backdrop-filter:none;}
  .pausecard{background:rgba(8,10,24,.82);border:2px solid rgba(34,240,255,.55);border-radius:18px;
    padding:36px 44px;display:flex;flex-direction:column;align-items:center;backdrop-filter:blur(3px);
    box-shadow:0 0 44px rgba(34,240,255,.3),inset 0 0 30px rgba(34,240,255,.07);}
</style>
</head>
<body>
<div id="wrap" class="crt">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div class="hudrow"><span class="lbl">HP</span><div class="bar" style="flex:1"><i id="hpfill"></i></div></div>
    <div id="stats">
      <span>FLOOR <b id="floor">1</b></span>
      <span>ROOMS <b id="rooms">0</b></span>
      <span>KILLS <b id="kills">0</b></span>
    </div>
    <div id="relics"></div>
  </div>

  <div id="stick"><i></i></div>

  <div id="controls">
    <button id="mutebtn" title="mute (M)"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
    <button id="pausebtn" title="pause (P)"><svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
  </div>

  <div id="pause" class="panel hidden">
    <div class="pausecard">
      <h1 style="color:var(--gold);text-shadow:0 0 22px var(--gold),4px 4px 0 var(--purple)">PAUSED</h1>
      <div class="btnrow" style="margin-top:24px">
        <button id="resumebtn">RESUME</button>
        <button id="pmenubtn">QUIT TO MENU</button>
      </div>
    </div>
  </div>

  <div id="menu" class="panel menu">
    <div class="logo"><div class="welcome">WELCOME TO</div><h1>NEON<br>DEPTHS</h1></div>
    <div class="sub">▸ descend or die ◂</div>
    <div class="best hidden" id="bestWrap">BEST&nbsp;&nbsp;<b id="best">0</b></div>
    <div class="keys">
      <b>WASD</b> / arrows to move &nbsp;·&nbsp; drag and touch on mobile
    </div>
    <div class="legend">
      <span class="chip start">▣ start</span><span class="chip">▦ combat</span><span class="chip elite">◈ elite</span><span class="chip treasure">◆ treasure</span><span class="chip boss">✖ boss</span>
    </div>
    <div class="modes">
      <button id="dailybtn" class="pulse">DAILY RUN</button>
      <button id="endlessbtn">ENDLESS</button>
    </div>
    <div class="subrow">
      <button id="upgradesbtn" class="ghostbtn">⬡ UPGRADES</button>
      <button id="boardbtn" class="ghostbtn">★ HIGH SCORES</button>
    </div>
    <div class="cores" id="menucores"></div>
    <div class="dailylabel" id="dailylabel"></div>
    <div class="tip" id="tip"></div>
  </div>

  <div id="levelup" class="panel hidden">
    <div class="levelbanner" id="rewardbanner">CHOOSE A RELIC</div>
    <div id="cards"></div>
  </div>

  <div id="death" class="panel dead hidden">
    <h1>YOU DIED</h1>
    <div id="resultcard"></div>
    <div class="btnrow">
      <button id="againbtn">RUN AGAIN</button>
      <button id="dupgradesbtn">UPGRADES</button>
      <button id="dboardbtn">HIGH SCORES</button>
      <button id="menubtn">MENU</button>
      <button id="copybtn">COPY RESULT</button>
    </div>
  </div>

  <div id="board" class="panel hidden">
    <h1 style="font-size:clamp(26px,7vw,52px)">HIGH SCORES</h1>
    <div class="boardsub">all-time best runs on this device</div>
    <div id="boardlist"></div>
    <button id="boardclose">CLOSE</button>
  </div>

  <div id="upgrades" class="panel hidden">
    <h1 style="font-size:clamp(26px,7vw,52px)">REACTOR</h1>
    <div class="coreshdr">◆ <b id="upcores">0</b> cores</div>
    <div id="metagrid"></div>
    <button id="upclose">CLOSE</button>
  </div>
</div>

<script>
(function(){
  const cv=document.getElementById('game'); const ctx=cv.getContext('2d');
  const scene=document.createElement('canvas'),sctx=scene.getContext('2d');
  const glowW=document.createElement('canvas'),gwctx=glowW.getContext('2d');
  const glowT=document.createElement('canvas'),gtctx=glowT.getContext('2d');
  const tintc=document.createElement('canvas'),tctx=tintc.getContext('2d');
  const grain=document.createElement('canvas'),grctx=grain.getContext('2d');
  let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
  const WSCALE=0.28,TSCALE=0.5;
  const TAU=Math.PI*2;
  const MOBILE=(typeof matchMedia!=='undefined'&&matchMedia('(pointer:coarse)').matches)||('ontouchstart' in window)||(navigator.maxTouchPoints>0);
  const ASSIST=MOBILE?{hp:0,ifr:0.1,spd:1,hitr:0.72,espd:0.93,edmg:0.93,ebspd:0.93,pdmg:1.07,prate:0.93,bcount:1,bcad:1}
                     :{hp:0,ifr:0,spd:1,hitr:0.82,espd:1,edmg:1,ebspd:1,pdmg:1,prate:1,bcount:1,bcad:1};
  const rand=(a,b)=>a+Math.random()*(b-a);
  const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
  const clamp=(v,a,b)=>v<a?a:v>b?b:v;

  function buildGrain(){grain.width=160;grain.height=160;const img=grctx.createImageData(160,160);
    for(let i=0;i<img.data.length;i+=4){const v=(Math.random()*255)|0;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}
    grctx.putImageData(img,0,0);}
  function resize(){const r=document.getElementById('wrap').getBoundingClientRect();W=r.width;H=r.height;
    [cv,scene].forEach(c=>{c.width=W*DPR;c.height=H*DPR;c.style.width=W+'px';c.style.height=H+'px';});
    ctx.setTransform(DPR,0,0,DPR,0,0);sctx.setTransform(DPR,0,0,DPR,0,0);
    glowW.width=Math.max(2,(W*WSCALE)|0);glowW.height=Math.max(2,(H*WSCALE)|0);
    tintc.width=glowW.width;tintc.height=glowW.height;
    glowT.width=Math.max(2,(W*TSCALE)|0);glowT.height=Math.max(2,(H*TSCALE)|0);makeStars();makeMenuShapes();}
  window.addEventListener('resize',resize);buildGrain();

  // ---- audio (synthesized, no assets) ----
  let actx=null,master=null,muted=false,musicTimer=null,musicStep=0,_hitT=0,_killT=0;
  function initAudio(){try{
    if(!actx){actx=new (window.AudioContext||window.webkitAudioContext)();
      master=actx.createGain();master.gain.value=muted?0:0.5;master.connect(actx.destination);actx.resume();startMusic();}
    else actx.resume();
  }catch(e){}}
  function tone(freq,dur,type,vol,slideTo,delay){
    if(!actx||muted)return;const t=actx.currentTime+(delay||0);
    const o=actx.createOscillator(),g=actx.createGain();o.type=type||'square';
    o.frequency.setValueAtTime(freq,t);if(slideTo)o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo),t+dur);
    g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol||0.15,t+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.03);}
  function noiseBurst(dur,vol,filt){

  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

  const DIRS={n:{x:0,y:-1,opp:'s'},s:{x:0,y:1,opp:'n'},e:{x:1,y:0,opp:'w'},w:{x:-1,y:0,opp:'e'}};
  const WALL=32, GAP=92;

  function genFloor(){
    const R=mode==='daily'?mulberry32(hashSeed(daySeed,floor,777)):Math.random;
    const rooms={};
    const start={gx:0,gy:0,type:'start',cleared:true,visited:true,seen:true,doors:{}};
    rooms[rkey(0,0)]=start; let list=[start];
    const target=Math.min(11,5+floor); let guard=0;
    while(list.length<target&&guard++<600){
      const base=list[(R()*list.length)|0];
      const ds=Object.keys(DIRS).sort(()=>R()-0.5);
      for(const d of ds){const nx=base.gx+DIRS[d].x,ny=base.gy+DIRS[d].y;
        if(!rooms[rkey(nx,ny)]){rooms[rkey(nx,ny)]={gx:nx,gy:ny,type:'combat',cleared:false,visited:false,seen:false,doors:{}};
          list.push(rooms[rkey(nx,ny)]);break;}}
    }
    for(const k in rooms){const r=rooms[k];for(const d in DIRS){if(rooms[rkey(r.gx+DIRS[d].x,r.gy+DIRS[d].y)])r.doors[d]=true;}}
    // BFS distances
    const dist={};dist[rkey(0,0)]=0;let q=[start];
    while(q.length){const r=q.shift();for(const d in DIRS){const nk=rkey(r.gx+DIRS[d].x,r.gy+DIRS[d].y);
      if(rooms[nk]&&dist[nk]===undefined){dist[nk]=dist[rkey(r.gx,r.gy)]+1;q.push(rooms[nk]);}}}
    let boss=null,bd=-1;for(const k in rooms){if(rooms[k].type!=='combat')continue;if(dist[k]>bd){bd=dist[k];boss=rooms[k];}}
    if(boss)boss.type='boss';
    const others=list.filter(r=>r.type==='combat');
    if(others.length){others.splice((R()*others.length)|0,1)[0].type='treasure';}
    if(others.length){others.splice((R()*others.length)|0,1)[0].type='elite';}
    floorMap=rooms;
    revealNeighbors(start);
    enterRoom(start,null);
  }

    const R=mode==='daily'?mulberry32(hashSeed(daySeed,floor,(room.gx*73856093^room.gy*19349663)>>>0)):Math.random;
    const rr=(a,b)=>a+R()*(b-a);

  function roomOpen(){return currentRoom.cleared||currentRoom.type==='start';}
  function tryDoor(d,nxp,nyp){
    const nb=floorMap[rkey(currentRoom.gx+DIRS[d].x,currentRoom.gy+DIRS[d].y)];if(!nb)return false;
    if(d==='n'&&nyp<=WALL+player.r+1&&Math.abs(player.x-W/2)<GAP/2-6){enterRoom(nb,'n');return true;}
    if(d==='s'&&nyp>=H-WALL-player.r-1&&Math.abs(player.x-W/2)<GAP/2-6){enterRoom(nb,'s');return true;}
    if(d==='e'&&nxp>=W-WALL-player.r-1&&Math.abs(player.y-H/2)<GAP/2-6){enterRoom(nb,'e');return true;}
    if(d==='w'&&nxp<=WALL+player.r+1&&Math.abs(player.y-H/2)<GAP/2-6){enterRoom(nb,'w');return true;}
    return false;
  }

  // ---- combat helpers (shared by bullets, orbits, chains, explosions) ----
  function nearestEnemy(x,y,exclude,maxd){let best=null,bd=maxd?maxd*maxd:Infinity;
    for(const e of enemies){if(e.dead||e===exclude||(exclude&&exclude.has&&exclude.has(e)))continue;
      const d=dist2(x,y,e.x,e.y);if(d<bd){bd=d;best=e;}}return best;}
  function killEnemy(e,fromBlast){
    if(e.dead)return;e.dead=true;kills++;
    if(e.isBoss){sfxBoss();hitStop=0.1;}else sfxKill();
    burst(e.x,e.y,e.color,e.isBoss?40:e.kind==='tank'?22:12,e.isBoss?280:220);
    if(e.kind==='tank'||e.isBoss)ring(e.x,e.y,e.color,e.isBoss?260:90,e.isBoss?0.9:1.4);
    if(e.isBoss)shake=Math.min(18,shake+14);else if(e.kind==='tank')shake=Math.min(18,shake+5);
    if(player.vamp&&Math.random()<player.vamp)player.hp=Math.min(player.maxhp,player.hp+4);
    if(player.explosive&&!fromBlast)explode(e.x,e.y);
    if(e.isBoss){for(let h=0;h<2;h++)hearts.push({x:e.x+rand(-40,40),y:e.y+rand(-40,40),heal:16,r:8,t:0});
      for(const z of enemies)if(!z.dead&&!z.isBoss){burst(z.x,z.y,z.color,8);z.dead=true;}}
  }
  function damageEnemy(e,dmg,crit,fromBlast){
    if(e.dead)return;e.hp-=dmg;e.hit=0.09;
    dnum(e.x,e.y-e.r,Math.round(dmg),crit?'#ff5ec4':'#ffe055');
    if(e.hp<=0)killEnemy(e,fromBlast);}
  function explode(x,y){const rad=46+player.explosive*16,dmg=player.dmg*(0.8+player.explosive*0.2);
    ring(x,y,'#ff9b3d',rad,1.5);burst(x,y,'#ff9b3d',16,260);
    for(const e of enemies)if(!e.dead&&dist2(x,y,e.x,e.y)<rad*rad){
      const a=Math.atan2(e.y-y,e.x-x),kb=e.isBoss?0:300;e.kx+=Math.cos(a)*kb;e.ky+=Math.sin(a)*kb;
      damageEnemy(e,dmg,false,true);}}
  function chainLightning(from,jumps){let src=from;const seen=new Set([from]);
    for(let j=0;j<jumps;j++){const t=nearestEnemy(src.x,src.y,seen,220);if(!t)break;
      bolts.push({x1:src.x,y1:src.y,x2:t.x,y2:t.y,life:0.16});
      damageEnemy(t,player.dmg*0.55,false,false);seen.add(t);src=t;}}


  function update(dt){
    time+=dt;if(bannerT>0)bannerT-=dt;
    let mx=0,my=0;
    if(keys['w']||keys['arrowup'])my-=1;
    if(keys['s']||keys['arrowdown'])my+=1;
    if(keys['a']||keys['arrowleft'])mx-=1;
    if(keys['d']||keys['arrowright'])mx+=1;
    if(tVX||tVY){mx=tVX;my=tVY;}
    const ml=Math.hypot(mx,my);if(ml>0){mx/=ml;my/=ml;if(ml<1){mx*=ml;my*=ml;}}
    {let aim;const tgt=enemies.length?nearestEnemy(player.x,player.y,null,99999):null;
      if(tgt)aim=Math.atan2(tgt.y-player.y,tgt.x-player.x);else if(ml>0)aim=Math.atan2(my,mx);
      if(aim!==undefined){let da=aim-player.heading;while(da>Math.PI)da-=TAU;while(da<-Math.PI)da+=TAU;player.heading+=da*Math.min(1,18*dt);}}
    let nxp=player.x+mx*player.speed*dt, nyp=player.y+my*player.speed*dt;
    if(roomOpen()){if(currentRoom.doors.n&&tryDoor('n',nxp,nyp))return;if(currentRoom.doors.s&&tryDoor('s',nxp,nyp))return;
      if(currentRoom.doors.e&&tryDoor('e',nxp,nyp))return;if(currentRoom.doors.w&&tryDoor('w',nxp,nyp))return;}
    player.x=clamp(nxp,WALL+player.r,W-WALL-player.r);
    player.y=clamp(nyp,WALL+player.r,H-WALL-player.r);

    if(ml>0.05)player.trail.push({x:player.x,y:player.y,life:0.4});
    for(let i=player.trail.length-1;i>=0;i--){player.trail[i].life-=dt;if(player.trail[i].life<=0)player.trail.splice(i,1);}
    if(player.trail.length>18)player.trail.splice(0,player.trail.length-18);
    if(player.regen)player.hp=Math.min(player.maxhp,player.hp+player.regen*dt);
    if(player.invuln>0)player.invuln-=dt;
    if(player.muzzle>0)player.muzzle-=dt;

    // fire
    player.fireTimer-=dt;
    if(player.fireTimer<=0&&enemies.length){
      let best=null,bd=Infinity;for(const e of enemies){const d=dist2(player.x,player.y,e.x,e.y);if(d<bd){bd=d;best=e;}}
      if(best){const base=Math.atan2(best.y-player.y,best.x-player.x);player.fireAngle=base;player.muzzle=0.07;
        const c=player.count,sp=0.18;
        for(let i=0;i<c;i++){const a=base+(i-(c-1)/2)*sp;
          bullets.push({x:player.x,y:player.y,vx:Math.cos(a)*player.bspeed,vy:Math.sin(a)*player.bspeed,ang:a,
            life:player.blife,r:player.brad,dmg:player.dmg,pierce:player.pierce,bounce:player.ricochet,hits:new Set()});}
        sfxShoot();player.fireTimer=player.fireInt;}}

    for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];
      b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
      let bounced=false;
      if(b.bounce>0){
        if(b.x<WALL+b.r){b.x=WALL+b.r;b.vx=Math.abs(b.vx);bounced=true;}
        else if(b.x>W-WALL-b.r){b.x=W-WALL-b.r;b.vx=-Math.abs(b.vx);bounced=true;}
        if(b.y<WALL+b.r){b.y=WALL+b.r;b.vy=Math.abs(b.vy);bounced=true;}
        else if(b.y>H-WALL-b.r){b.y=H-WALL-b.r;b.vy=-Math.abs(b.vy);bounced=true;}
        if(bounced){b.bounce--;b.ang=Math.atan2(b.vy,b.vx);b.hits=new Set();}
      }
      if(b.life<=0||(!bounced&&(b.x<WALL-10||b.x>W-WALL+10||b.y<WALL-10||b.y>H-WALL+10)))bullets.splice(i,1);}
    // lightning bolts fade
    for(let i=bolts.length-1;i>=0;i--){bolts[i].life-=dt;if(bolts[i].life<=0)bolts.splice(i,1);}

    for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(e.dead)continue;
      if(e.kx===undefined){e.kx=0;e.ky=0;}
      const ang=Math.atan2(player.y-e.y,player.x-e.x);
      e.x=clamp(e.x+(Math.cos(ang)*e.speed+e.kx)*dt,WALL+e.r,W-WALL-e.r);
      e.y=clamp(e.y+(Math.sin(ang)*e.speed+e.ky)*dt,WALL+e.r,H-WALL-e.r);
      {const kd=Math.max(0,1-9*dt);e.kx*=kd;e.ky*=kd;}
      e.rot+=(e.spin||0)*dt;if(e.hit>0)e.hit-=dt;if(e.orbCd>0)e.orbCd-=dt;
      if(e.elec>0){e.elec-=dt;e.eTick=(e.eTick||0)+dt;
        if(e.eTick>=0.2){e.eTick-=0.2;damageEnemy(e,e.elecDmg*0.2,false,false);}
        if(Math.random()<0.5)particles.push({x:e.x+rand(-e.r,e.r),y:e.y+rand(-e.r,e.r),vx:rand(-40,40),vy:rand(-40,40),life:0.18,max:0.18,color:'#bff9ff',r:rand(1,2.4)});
        if(e.dead)continue;}
      if(e.isBoss){e.spawnT-=dt;if(e.spawnT<=0&&enemies.length<16){e.spawnT=2.6*ASSIST.bcad;
        for(let k=0;k<2;k++)enemies.push(mkEnemy(Math.random()<0.5?'shooter':'fast',clamp(e.x+rand(-50,50),WALL+30,W-WALL-30),clamp(e.y+rand(-50,50),WALL+30,H-WALL-30)));}
        e.burstT-=dt;if(e.burstT<=0){e.burstT=3.5*ASSIST.bcad;const m=Math.max(5,Math.round((10+floor*2)*ASSIST.bcount)),base=Math.atan2(player.y-e.y,player.x-e.x);
          for(let k=0;k<m;k++){const a=base+k/m*TAU;ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*180*ASSIST.ebspd,vy:Math.sin(a)*180*ASSIST.ebspd,r:6,dmg:(16+floor*3)*ASSIST.edmg,life:4.5});}}}
      if(e.kind==='shooter'){e.shootT-=dt;if(e.shootT<=0){e.shootT=rand(1.4,2.2);
        const a=Math.atan2(player.y-e.y,player.x-e.x);ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*240*ASSIST.ebspd,vy:Math.sin(a)*240*ASSIST.ebspd,r:5,dmg:e.dmg,life:3.2});}}
      const rr=e.r+player.hitr;
      if(player.invuln<=0&&dist2(e.x,e.y,player.x,player.y)<rr*rr){player.hp-=e.dmg;player.invuln=player.invulnDur;dmgFlash=1;sfxHurt();
        shake=Math.min(16,shake+9);burst(player.x,player.y,'#ff2d6f',12);if(player.hp<=0){die();return;}}
      for(let j=bullets.length-1;j>=0;j--){const b=bullets[j];if(b.hits.has(e))continue;const cr=e.r+b.r;
        if(dist2(e.x,e.y,b.x,b.y)<cr*cr){b.hits.add(e);sfxHit();burst(b.x,b.y,'#fffbe6',3,140);
          const crit=player.crit>0&&Math.random()<player.crit;
          damageEnemy(e,b.dmg*(crit?3:1),crit,false);
          {const kb=e.isBoss?0:e.kind==='tank'?130:e.kind==='fast'?360:400;e.kx+=Math.cos(b.ang)*kb;e.ky+=Math.sin(b.ang)*kb;}
          if(player.electric){e.elec=2.4;e.elecDmg=b.dmg*0.5*player.electric;}
          if(player.chain)chainLightning(e,player.chain);
          if(b.pierce<=0&&b.bounce<=0)bullets.splice(j,1);else if(b.pierce>0)b.pierce--;
          if(e.dead)break;}}
    }
    // orbiting blades
    if(player.orbit>0){player.orbitAng+=dt*2.6;const OR=50,ob=12,od=player.dmg*0.5;
      for(let k=0;k<player.orbit;k++){const a=player.orbitAng+k/player.orbit*TAU,ox=player.x+Math.cos(a)*OR,oy=player.y+Math.sin(a)*OR;
        for(const e of enemies){if(e.dead||e.orbCd>0)continue;const cr=e.r+ob;
          if(dist2(ox,oy,e.x,e.y)<cr*cr){damageEnemy(e,od,false,false);e.orbCd=0.28;burst(ox,oy,'#22f0ff',3,120);}}}}
    // remove dead
    for(let i=enemies.length-1;i>=0;i--)if(enemies[i].dead)enemies.splice(i,1);

    for(let i=hearts.length-1;i>=0;i--){const h=hearts[i];h.t+=dt;
      if(dist2(h.x,h.y,player.x,player.y)<(player.r+12)*(player.r+12)){player.hp=Math.min(player.maxhp,player.hp+h.heal);sfxHeart();
        burst(h.x,h.y,'#5dffa0',8,140);hearts.splice(i,1);}}

    for(let i=ebullets.length-1;i>=0;i--){const b=ebullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
      if(b.life<=0||b.x<WALL-8||b.x>W-WALL+8||b.y<WALL-8||b.y>H-WALL+8){ebullets.splice(i,1);continue;}
      const rr=b.r+player.hitr;
      if(player.invuln<=0&&dist2(b.x,b.y,player.x,player.y)<rr*rr){player.hp-=b.dmg;player.invuln=player.invulnDur;dmgFlash=1;sfxHurt();
        shake=Math.min(16,shake+8);burst(player.x,player.y,'#ff2d6f',10);ebullets.splice(i,1);if(player.hp<=0){die();return;}}}

    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.9;p.vy*=0.9;p.life-=dt;if(p.life<=0)particles.splice(i,1);}
    for(let i=shock.length-1;i>=0;i--){const s=shock[i];s.r+=(s.maxr-s.r)*6*dt*s.speed;s.life-=dt*1.8*s.speed;if(s.life<=0)shock.splice(i,1);}
    for(let i=dnums.length-1;i>=0;i--){const d=dnums[i];d.y+=d.vy*dt;d.vy*=0.92;d.life-=dt;if(d.life<=0)dnums.splice(i,1);}

    // room clear check
    if(!currentRoom.cleared){
      if(currentRoom.type==='boss'){if(!enemies.some(e=>e.isBoss))clearRoom();}
      else if((currentRoom.type==='combat'||currentRoom.type==='elite')&&enemies.length===0)clearRoom();
    }
    if(shake>0)shake=Math.max(0,shake-dt*40);
    if(dmgFlash>0)dmgFlash=Math.max(0,dmgFlash-dt*3);
  }

  function die(){state='dead';burst(player.x,player.y,'#fffbe6',46,320);burst(player.x,player.y,'#22f0ff',30,240);
    ring(player.x,player.y,'#22f0ff',260,0.9);ring(player.x,player.y,'#ff2d6f',180,1.3);shake=16;

    lastEntry={s:score,f:floor,m:mode,d:dstr};

    const blocks='🟦'.repeat(Math.max(0,Math.min(floor,12)-1))+'💀';

  // ---- drawing ----
  function poly(c,x,y,r,sides,rot){c.beginPath();for(let i=0;i<sides;i++){const a=rot+i/sides*TAU;const px=x+Math.cos(a)*r,py=y+Math.sin(a)*r;i?c.lineTo(px,py):c.moveTo(px,py);}c.closePath();}
  function star4(c,x,y,r,rot){c.beginPath();for(let i=0;i<8;i++){const a=rot+i/8*TAU;const rr=(i%2)?r*0.42:r;c.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);}c.closePath();}

  function drawEnemy(c,e){
    if(e.isBoss){c.save();c.translate(e.x,e.y);
      const bg=c.createRadialGradient(0,0,0,0,0,e.r);bg.addColorStop(0,'#fff');bg.addColorStop(.4,e.color);bg.addColorStop(1,'rgba(40,0,60,.6)');
      c.rotate(e.rot);poly(c,0,0,e.r,6,0);c.fillStyle=e.hit>0?'#fff':bg;c.fill();c.lineWidth=3;c.strokeStyle='#fff';c.stroke();
      c.rotate(-e.rot*1.6);poly(c,0,0,e.r*0.6,3,0);c.fillStyle='rgba(255,255,255,.25)';c.fill();
      const cp=1+Math.sin(time*5)*0.12;c.fillStyle='#fffbe6';c.beginPath();c.arc(0,0,e.r*0.28*cp,0,TAU);c.fill();
      c.restore();return;}
    const flash=e.hit>0,pulse=(1+Math.sin(time*5+e.rot)*0.05)*(flash?1.22:1);
    const bg=c.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
    bg.addColorStop(0,'#fff');bg.addColorStop(.35,flash?'#fff':e.color);bg.addColorStop(1,flash?'#fff':'rgba(0,0,0,.55)');
    c.save();c.translate(e.x,e.y);c.scale(pulse,pulse);c.rotate(e.rot);c.fillStyle=bg;c.lineWidth=2;c.strokeStyle=flash?'#fff':e.color;
    if(e.kind==='fast'){c.beginPath();c.moveTo(e.r,0);c.lineTo(-e.r*.7,e.r*.7);c.lineTo(-e.r*.3,0);c.lineTo(-e.r*.7,-e.r*.7);c.closePath();c.fill();c.stroke();
      c.fillStyle='#fffbe6';c.beginPath();c.arc(-e.r*.1,0,e.r*.26,0,TAU);c.fill();}
    else if(e.kind==='tank'){poly(c,0,0,e.r,6,0);c.fill();c.lineWidth=3;c.stroke();c.fillStyle='rgba(0,0,0,.4)';poly(c,0,0,e.r*.62,6,Math.PI/6);c.fill();
      c.fillStyle='#fffbe6';c.beginPath();c.arc(0,0,e.r*.24,0,TAU);c.fill();}
    else if(e.kind==='shooter'){poly(c,0,0,e.r,5,0);c.fill();c.stroke();
      c.strokeStyle='#fffbe6';c.lineWidth=1.5;c.beginPath();c.arc(0,0,e.r*0.5,0,TAU);c.stroke();
      c.fillStyle='#fffbe6';c.beginPath();c.arc(0,0,e.r*0.22,0,TAU);c.fill();}
    else{star4(c,0,0,e.r,0);c.fill();c.stroke();const cp=1+Math.sin(time*7+e.rot)*0.2;c.fillStyle='#fffbe6';c.beginPath();c.arc(0,0,e.r*.3*cp,0,TAU);c.fill();}
    c.restore();
    if(e.maxhp>40&&!e.isBoss){const w=e.r*2,ra=clamp(e.hp/e.maxhp,0,1);c.fillStyle='rgba(0,0,0,.55)';c.fillRect(e.x-e.r,e.y-e.r-9,w,3);c.fillStyle='#5dffa0';c.fillRect(e.x-e.r,e.y-e.r-9,w*ra,3);}
  }

  function drawWalls(c){
    const open=roomOpen();
    c.lineWidth=4;c.lineCap='round';
    const seg=(x1,y1,x2,y2,col)=>{c.strokeStyle=col;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();};
    const cyl='rgba(34,240,255,.85)';
    const sides=[
      {d:'n',horiz:true, a:WALL, b:WALL},
      {d:'s',horiz:true, a:H-WALL, b:H-WALL},
      {d:'w',horiz:false,a:WALL, b:WALL},
      {d:'e',horiz:false,a:W-WALL,b:W-WALL},
    ];
    for(const s of sides){
      const hasDoor=currentRoom.doors[s.d];
      if(s.horiz){
        const y=s.a;
        if(!hasDoor){seg(WALL,y,W-WALL,y,cyl);}
        else{seg(WALL,y,W/2-GAP/2,y,cyl);seg(W/2+GAP/2,y,W-WALL,y,cyl);
          // door
          if(open){seg(W/2-GAP/2,y,W/2-GAP/2,y+(s.d==='n'?12:-12),'rgba(93,255,160,.8)');seg(W/2+GAP/2,y,W/2+GAP/2,y+(s.d==='n'?12:-12),'rgba(93,255,160,.8)');}
          else{c.strokeStyle='rgba(255,45,111,.85)';c.lineWidth=6;c.beginPath();c.moveTo(W/2-GAP/2,y);c.lineTo(W/2+GAP/2,y);c.stroke();c.lineWidth=4;}}
      } else {
        const x=s.a;
        if(!hasDoor){seg(x,WALL,x,H-WALL,cyl);}
        else{seg(x,WALL,x,H/2-GAP/2,cyl);seg(x,H/2+GAP/2,x,H-WALL,cyl);
          if(open){seg(x,H/2-GAP/2,x+(s.d==='w'?12:-12),H/2-GAP/2,'rgba(93,255,160,.8)');seg(x,H/2+GAP/2,x+(s.d==='w'?12:-12),H/2+GAP/2,'rgba(93,255,160,.8)');}
          else{c.strokeStyle='rgba(255,45,111,.85)';c.lineWidth=6;c.beginPath();c.moveTo(x,H/2-GAP/2);c.lineTo(x,H/2+GAP/2);c.stroke();c.lineWidth=4;}}
      }
    }
  }

  function drawScene(){
    const c=sctx;
    const g=c.createRadialGradient(W*.5,H*.4,40,W*.5,H*.4,Math.max(W,H)*.8);g.addColorStop(0,'#0c0f28');g.addColorStop(1,'#05060f');
    c.fillStyle=g;c.fillRect(0,0,W,H);
    c.globalCompositeOperation='lighter';
    const nb=(cx,cy,rad,col,al)=>{const ng=c.createRadialGradient(cx,cy,0,cx,cy,rad);ng.addColorStop(0,col);ng.addColorStop(1,'rgba(0,0,0,0)');
      c.globalAlpha=al;c.fillStyle=ng;c.beginPath();c.arc(cx,cy,rad,0,TAU);c.fill();};
    nb(W*.3+Math.sin(time*.13)*60,H*.35+Math.cos(time*.1)*50,W*.5,'rgba(80,30,160,1)',.5);
    nb(W*.72+Math.cos(time*.11)*70,H*.62+Math.sin(time*.09)*60,W*.45,'rgba(0,90,140,1)',.42);
    c.globalAlpha=1;c.globalCompositeOperation='source-over';
    for(const s of stars){const tw=.55+.45*Math.sin(time*s.tw+s.ph);c.globalAlpha=tw*s.z;c.fillStyle=s.c;c.beginPath();c.arc(s.x,s.y,s.r*s.z,0,TAU);c.fill();}
    c.globalAlpha=1;
    // floor grid (within room)
    c.strokeStyle='rgba(34,240,255,0.06)';c.lineWidth=1;const gs=52;c.beginPath();
    for(let x=WALL;x<=W-WALL;x+=gs){c.moveTo(x,WALL);c.lineTo(x,H-WALL);}
    for(let y=WALL;y<=H-WALL;y+=gs){c.moveTo(WALL,y);c.lineTo(W-WALL,y);}c.stroke();

    if(state==='menu'){for(const m of menuShapes)drawEnemy(c,m);return;}
    drawWalls(c);
    // player light
    c.globalCompositeOperation='lighter';const lg=c.createRadialGradient(player.x,player.y,0,player.x,player.y,150);
    lg.addColorStop(0,'rgba(34,240,255,0.18)');lg.addColorStop(1,'rgba(34,240,255,0)');c.fillStyle=lg;c.beginPath();c.arc(player.x,player.y,150,0,TAU);c.fill();
    c.globalCompositeOperation='source-over';
    for(const s of shock){c.globalAlpha=clamp(s.life,0,1);c.strokeStyle=s.color;c.lineWidth=3;c.beginPath();c.arc(s.x,s.y,s.r,0,TAU);c.stroke();}c.globalAlpha=1;
    // hearts
    for(const h of hearts){const p=1+Math.sin(h.t*5)*0.12;c.fillStyle='#5dffa0';c.beginPath();c.arc(h.x,h.y,h.r*p,0,TAU);c.fill();
      c.fillStyle='#04140a';c.fillRect(h.x-1.5,h.y-h.r*.5,3,h.r);c.fillRect(h.x-h.r*.5,h.y-1.5,h.r,3);}
    for(const e of enemies)drawEnemy(c,e);
    c.globalCompositeOperation='lighter';
    for(const b of bullets){const tx=b.x-Math.cos(b.ang)*b.r*4,ty=b.y-Math.sin(b.ang)*b.r*4;const lg2=c.createLinearGradient(tx,ty,b.x,b.y);
      lg2.addColorStop(0,'rgba(255,224,85,0)');lg2.addColorStop(1,'rgba(255,251,230,.9)');c.strokeStyle=lg2;c.lineWidth=b.r*1.6;c.lineCap='round';
      c.beginPath();c.moveTo(tx,ty);c.lineTo(b.x,b.y);c.stroke();c.fillStyle='#fffbe6';c.beginPath();c.arc(b.x,b.y,b.r,0,TAU);c.fill();}
    for(const b of ebullets){const eg=c.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*2.2);
      eg.addColorStop(0,'#ffd1ef');eg.addColorStop(.5,'#ff5ec4');eg.addColorStop(1,'rgba(255,94,196,0)');
      c.fillStyle=eg;c.beginPath();c.arc(b.x,b.y,b.r*2.2,0,TAU);c.fill();
      c.fillStyle='#fffbe6';c.beginPath();c.arc(b.x,b.y,b.r*0.55,0,TAU);c.fill();}
    for(const p of particles){c.globalAlpha=clamp(p.life/p.max,0,1);c.fillStyle=p.color;c.beginPath();c.arc(p.x,p.y,p.r,0,TAU);c.fill();}
    c.globalAlpha=1;c.globalCompositeOperation='source-over';
    // trail
    c.globalCompositeOperation='lighter';
    for(const t of player.trail){c.globalAlpha=(t.life/.4)*.5;c.fillStyle='#22f0ff';c.beginPath();c.arc(t.x,t.y,player.r*.5*(t.life/.4),0,TAU);c.fill();}
    c.globalAlpha=1;c.globalCompositeOperation='source-over';
    // chain lightning
    if(bolts.length){c.globalCompositeOperation='lighter';c.strokeStyle='#bff9ff';c.lineWidth=2.5;
      for(const z of bolts){c.globalAlpha=clamp(z.life/0.16,0,1);c.beginPath();c.moveTo(z.x1,z.y1);
        const segs=5;for(let s=1;s<segs;s++){const t=s/segs;c.lineTo(z.x1+(z.x2-z.x1)*t+rand(-7,7),z.y1+(z.y2-z.y1)*t+rand(-7,7));}
        c.lineTo(z.x2,z.y2);c.stroke();}
      c.globalAlpha=1;c.globalCompositeOperation='source-over';}
    // orbiting blades
    if(player.orbit>0){c.globalCompositeOperation='lighter';
      for(let k=0;k<player.orbit;k++){const a=player.orbitAng+k/player.orbit*TAU,ox=player.x+Math.cos(a)*50,oy=player.y+Math.sin(a)*50;
        const og=c.createRadialGradient(ox,oy,0,ox,oy,13);og.addColorStop(0,'#fffbe6');og.addColorStop(.4,'#22f0ff');og.addColorStop(1,'rgba(34,240,255,0)');
        c.fillStyle=og;c.beginPath();c.arc(ox,oy,13,0,TAU);c.fill();}
      c.globalCompositeOperation='source-over';}
    // ship
    {c.save();c.translate(player.x,player.y);c.rotate(player.heading);
      if(player.muzzle>0){c.save();c.rotate(player.fireAngle-player.heading);c.globalCompositeOperation='lighter';c.globalAlpha=player.muzzle/.07;
        const mg=c.createRadialGradient(player.r+6,0,0,player.r+6,0,18);mg.addColorStop(0,'rgba(255,251,230,.95)');mg.addColorStop(1,'rgba(255,224,85,0)');
        c.fillStyle=mg;c.beginPath();c.arc(player.r+6,0,18,0,TAU);c.fill();c.restore();}
      const hg=c.createLinearGradient(-player.r,0,player.r+2,0);hg.addColorStop(0,'#0a6b78');hg.addColorStop(.5,'#22f0ff');hg.addColorStop(1,'#bff9ff');
      c.beginPath();c.moveTo(player.r+3,0);c.lineTo(-player.r*.85,player.r*.9);c.lineTo(-player.r*.35,0);c.lineTo(-player.r*.85,-player.r*.9);c.closePath();
      c.fillStyle=hg;c.fill();c.lineWidth=1.6;c.strokeStyle='#dffcff';c.stroke();
      const cp=1+Math.sin(time*8)*.18;c.fillStyle='#eafffd';c.beginPath();c.arc(player.r*.05,0,player.r*.3*cp,0,TAU);c.fill();
      c.restore();}
    c.textAlign='center';for(const d of dnums){c.globalAlpha=clamp(d.life/.7,0,1);c.fillStyle=d.color;c.font='20px VT323, monospace';c.fillText(d.val,d.x,d.y);}c.globalAlpha=1;
  }

  function caChannel(src,color,ox,oy,sx,sy,al){tctx.globalCompositeOperation='source-over';tctx.clearRect(0,0,tintc.width,tintc.height);
    tctx.drawImage(src,0,0,tintc.width,tintc.height);tctx.globalCompositeOperation='multiply';tctx.fillStyle=color;tctx.fillRect(0,0,tintc.width,tintc.height);
    ctx.globalCompositeOperation='lighter';ctx.globalAlpha=al;ctx.drawImage(tintc,sx+ox,sy+oy,W,H);}

  function composite(){
    ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.clearRect(0,0,W,H);
    let sx=0,sy=0;if(shake>0){sx=rand(-shake,shake);sy=rand(-shake,shake);}ctx.imageSmoothingEnabled=true;
    ctx.drawImage(scene,sx,sy,W,H);
    gwctx.globalCompositeOperation='source-over';gwctx.clearRect(0,0,glowW.width,glowW.height);gwctx.filter='blur(2.5px)';gwctx.drawImage(scene,0,0,glowW.width,glowW.height);gwctx.filter='none';
    const ca=2.2;caChannel(glowW,'#ff0000',-ca,.4,sx,sy,.5);caChannel(glowW,'#00ff00',0,0,sx,sy,.5);caChannel(glowW,'#0000ff',ca,-.4,sx,sy,.5);
    gtctx.globalCompositeOperation='source-over';gtctx.clearRect(0,0,glowT.width,glowT.height);gtctx.filter='blur(1px)';gtctx.drawImage(scene,0,0,glowT.width,glowT.height);gtctx.filter='none';
    ctx.globalCompositeOperation='lighter';ctx.globalAlpha=.45;ctx.drawImage(glowT,sx,sy,W,H);
    ctx.globalCompositeOperation='overlay';ctx.globalAlpha=.05;const gox=-(Math.random()*120)|0,goy=-(Math.random()*120)|0;
    for(let y=goy;y<H;y+=160)for(let x=gox;x<W;x+=160)ctx.drawImage(grain,x,y);
    ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
    if(dmgFlash>0){ctx.fillStyle=`rgba(255,45,111,${dmgFlash*.3})`;ctx.fillRect(0,0,W,H);}
  }

  // overlay drawn crisp (minimap, boss bar, banner)
  function drawOverlay(){
    if(state==='menu')return;
    // minimap
    let minx=99,maxx=-99,miny=99,maxy=-99;
    for(const k in floorMap){const r=floorMap[k];if(!r.seen)continue;minx=Math.min(minx,r.gx);maxx=Math.max(maxx,r.gx);miny=Math.min(miny,r.gy);maxy=Math.max(maxy,r.gy);}
    const cell=15,pad=3,ox=W-((maxx-minx+1)*(cell+pad))-16,oy=70;
    for(const k in floorMap){const r=floorMap[k];if(!r.seen)continue;
      const x=ox+(r.gx-minx)*(cell+pad),y=oy+(r.gy-miny)*(cell+pad);
      let col='rgba(34,240,255,.25)';
      if(r.type==='boss')col='rgba(255,45,111,.7)';else if(r.type==='treasure')col='rgba(93,255,160,.7)';else if(r.type==='elite')col='rgba(255,155,61,.7)';
      ctx.globalAlpha=r.visited?0.9:0.35;
      ctx.fillStyle=r.visited?col:'rgba(255,255,255,.08)';ctx.fillRect(x,y,cell,cell);
      ctx.globalAlpha=1;ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(x+.5,y+.5,cell-1,cell-1);
      if(r===currentRoom){ctx.strokeStyle='#fffbe6';ctx.lineWidth=2;ctx.strokeRect(x-1,y-1,cell+2,cell+2);}}
    ctx.globalAlpha=1;
    // boss bar
    const boss=enemies.find(e=>e.isBoss);
    if(boss){const bw=Math.min(420,W-80),bx=(W-bw)/2,by=H-40;
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx,by,bw,12);
      ctx.fillStyle='#bd5bff';ctx.fillRect(bx,by,bw*clamp(boss.hp/boss.maxhp,0,1),12);
      ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,12);
      ctx.fillStyle='#fffbe6';ctx.font='20px Silkscreen, monospace';ctx.textAlign='center';ctx.fillText('FLOOR '+floor+' GUARDIAN',W/2,by-6);}
    // banner
    if(bannerT>0){ctx.globalAlpha=clamp(bannerT,0,1);ctx.fillStyle='#22f0ff';ctx.font='44px Silkscreen, monospace';ctx.textAlign='center';
      ctx.shadowColor='#22f0ff';ctx.shadowBlur=20;ctx.fillText(bannerTxt,W/2,H/2);ctx.shadowBlur=0;ctx.globalAlpha=1;}
  }

  const hpfill=document.getElementById('hpfill'),floorEl=document.getElementById('floor'),roomsEl=document.getElementById('rooms'),killsEl=document.getElementById('kills');
  const relicsEl=document.getElementById('relics');
  function drawRelics(){relicsEl.innerHTML=player.relics.map(i=>`<span>${i}</span>`).join('');}
  function drawHUD(){hpfill.style.transform=`scaleX(${clamp(player.hp/player.maxhp,0,1)})`;floorEl.textContent=floor;roomsEl.textContent=roomsCleared;killsEl.textContent=kills;}

  let lastTime=performance.now();
  function loop(now){const dt=Math.min(.05,(now-lastTime)/1000);lastTime=now;
    if(state==='play'){if(hitStop>0){hitStop-=dt;}else update(dt);drawHUD();} else {time+=dt;if(bannerT>0)bannerT-=dt;
      if(state==='menu')for(const m of menuShapes){m.x+=m.vx*dt;m.y+=m.vy*dt;m.rot+=m.spin*dt;
        if(m.x<-30)m.x=W+30;else if(m.x>W+30)m.x=-30;if(m.y<-30)m.y=H+30;else if(m.y>H+30)m.y=-30;}}
    drawScene();composite();drawOverlay();requestAnimationFrame(loop);}

  function startGame(m){lastEntry=null;initAudio();resetRun(m);drawRelics();document.getElementById('menu').classList.add('hidden');document.getElementById('death').classList.add('hidden');
    document.getElementById('pause').classList.add('hidden');document.getElementById('hud').classList.remove('hidden');
    document.getElementById('pausebtn').style.display='';lastTime=performance.now();state='play';}
  function toMenu(){document.getElementById('death').classList.add('hidden');document.getElementById('hud').classList.add('hidden');
    document.getElementById('pause').classList.add('hidden');document.getElementById('pausebtn').style.display='none';
    document.getElementById('menu').classList.remove('hidden');makeMenuShapes();showBest();showTip();showDaily();renderMeta();state='menu';}
  function showDaily(){const d=new Date();const lbl=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    document.getElementById('dailylabel').textContent="today's dungeon · "+lbl+" — same for everyone";}
  function renderMeta(){
    document.getElementById('upcores').textContent=cores;
    document.getElementById('menucores').textContent='◆ '+cores+' cores banked';
    const grid=document.getElementById('metagrid');grid.innerHTML='';
    META.forEach(m=>{const lv=meta[m.id]||0,maxed=lv>=m.max,cost=maxed?0:m.cost(lv);
      const node=document.createElement('div');node.className='node';
      let pips='';for(let i=0;i<m.max;i++)pips+=`<div class="pip ${i<lv?'on':''}"></div>`;
      node.innerHTML=`<div class="ico">${m.ico}</div><div class="nm">${m.nm}</div><div class="ds">${m.ds}</div><div class="pips">${pips}</div>`;
      const btn=document.createElement('button');btn.textContent=maxed?'MAXED':'◆ '+cost;
      btn.disabled=maxed||cores<cost;
      btn.onclick=()=>{const l=meta[m.id]||0;if(l>=m.max||cores<m.cost(l))return;cores-=m.cost(l);meta[m.id]=l+1;saveMeta();sfxRelic();renderMeta();};
      node.appendChild(btn);grid.appendChild(node);});}
  function openUpgrades(from){upgradesReturn=from;renderMeta();
    document.getElementById('menu').classList.add('hidden');document.getElementById('death').classList.add('hidden');
    document.getElementById('upgrades').classList.remove('hidden');}
  function closeUpgrades(){document.getElementById('upgrades').classList.add('hidden');
    if(upgradesReturn==='death')document.getElementById('death').classList.remove('hidden');else toMenu();}
  function renderLeaderboard(){const list=document.getElementById('boardlist');
    if(!scores.length){list.innerHTML='<div class="empty">no runs yet — go descend!</div>';return;}
    list.innerHTML=scores.map((e,i)=>`<div class="brow${e===lastEntry?' you':''}"><span class="rank">#${i+1}</span><span class="bscore">${e.s.toLocaleString()}</span><span class="bmeta">F${e.f} · ${e.m==='daily'?'daily':'endless'} · ${e.d}</span></div>`).join('');}
  function openBoard(from){boardReturn=from;renderLeaderboard();
    document.getElementById('menu').classList.add('hidden');document.getElementById('death').classList.add('hidden');
    document.getElementById('board').classList.remove('hidden');}
  function closeBoard(){document.getElementById('board').classList.add('hidden');
    if(boardReturn==='death')document.getElementById('death').classList.remove('hidden');else toMenu();}
  function pause(){if(state!=='play')return;state='paused';document.getElementById('pause').classList.remove('hidden');}
  function resume(){if(state!=='paused')return;document.getElementById('pause').classList.add('hidden');lastTime=performance.now();state='play';}
  document.getElementById('dailybtn').onclick=()=>startGame('daily');
  document.getElementById('endlessbtn').onclick=()=>startGame('endless');
  document.getElementById('againbtn').onclick=()=>startGame(mode);
  document.getElementById('menubtn').onclick=toMenu;
  document.getElementById('upgradesbtn').onclick=()=>openUpgrades('menu');
  document.getElementById('dupgradesbtn').onclick=()=>openUpgrades('death');
  document.getElementById('upclose').onclick=closeUpgrades;
  document.getElementById('boardbtn').onclick=()=>openBoard('menu');
  document.getElementById('dboardbtn').onclick=()=>openBoard('death');
  document.getElementById('boardclose').onclick=closeBoard;
  document.getElementById('pmenubtn').onclick=toMenu;
  document.getElementById('resumebtn').onclick=resume;
  document.getElementById('mutebtn').onclick=()=>{initAudio();toggleMute();};
  document.getElementById('pausebtn').onclick=()=>{state==='play'?pause():resume();};
  document.getElementById('pausebtn').style.display='none';
  window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();
    if(k==='p'||k==='escape'){if(state==='play')pause();else if(state==='paused')resume();}
    else if(k==='m'){initAudio();toggleMute();}});
  document.getElementById('copybtn').onclick=function(){const txt=window._result||'';const done=()=>{this.textContent='COPIED!';setTimeout(()=>this.textContent='COPY RESULT',1400);};
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(txt).then(done).catch(()=>prompt('Copy your result:',txt));else prompt('Copy your result:',txt);};

  loadMeta();resize();showTip();showDaily();renderMeta();requestAnimationFrame(loop);
})();
</script>
</body>
